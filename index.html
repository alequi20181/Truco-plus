<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Truco Plus - Developer Edition</title>
    <style>
        :root { --table: #1a472a; --magic: #9b59b6; --gold: #f1c40f; --danger: #e74c3c; --dev: #2c3e50; }
        body { background: #111; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Painel Dev */
        #dev-panel { position: absolute; left: 0; top: 0; width: 220px; height: 100%; background: rgba(44, 62, 80, 0.95); border-right: 3px solid var(--gold); padding: 15px; box-sizing: border-box; z-index: 100; transform: translateX(-200px); transition: 0.3s; }
        #dev-panel:hover { transform: translateX(0); }
        #dev-panel h3 { color: var(--gold); margin-top: 0; font-size: 16px; text-transform: uppercase; }
        .dev-group { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .dev-btn { background: #34495e; color: white; border: 1px solid white; width: 100%; margin: 5px 0; padding: 5px; cursor: pointer; font-size: 12px; border-radius: 4px; }
        .dev-btn:hover { background: var(--gold); color: black; }

        /* Container Principal */
        #game-container { width: 900px; height: 650px; background: var(--table); border: 10px solid #3e2723; border-radius: 40px; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .status-panel { display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px; border: 2px solid var(--gold); }
        .score-num { font-size: 32px; font-weight: bold; color: var(--gold); display: block; }
        .mesa { display: flex; justify-content: center; gap: 30px; align-items: center; height: 200px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px; margin: 10px 0; }
        .controls { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; }
        .btn-call { background: var(--danger); color: white; border: 2px solid white; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 10px; text-transform: uppercase; min-width: 140px; }
        .btn-call:disabled { opacity: 0.3; filter: grayscale(1); }
        .hand-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .hand { display: flex; gap: 10px; min-height: 120px; }
        .magic-slots { display: flex; gap: 10px; padding: 8px; background: rgba(155, 89, 182, 0.3); border-radius: 10px; border: 1px solid var(--magic); min-height: 90px; min-width: 200px; justify-content: center; }
        .card { width: 85px; height: 120px; background: white; border-radius: 10px; color: black; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; font-size: 20px; }
        .card.magic { width: 70px; height: 100px; font-size: 11px; border: 2px solid var(--magic); background: #fdf0ff; color: #8e44ad; }
        .card.manilha { border: 3px solid #2980b9; background: #e1f5fe; color: #2980b9; }
        .glow { box-shadow: 0 0 20px var(--gold); border: 3px solid var(--gold) !important; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="dev-panel">
    <h3>🛠 Dev Tools</h3>
    <div class="dev-group">
        <span>Pontuação</span>
        <button class="dev-btn" onclick="devAddScore('p', 1)">+1 Você</button>
        <button class="dev-btn" onclick="devAddScore('ia', 1)">+1 IA</button>
    </div>
    <div class="dev-group">
        <span>Mecânicas</span>
        <button class="dev-btn" onclick="novaMao()">Forçar Nova Mão</button>
        <button class="dev-btn" onclick="devToggleIA()">Mudar Inteligência IA</button>
        <button class="dev-btn" onclick="devGivePower()">Ganhar Magia Aleatória</button>
    </div>
    <div class="dev-group">
        <span>Debug</span>
        <button class="dev-btn" onclick="console.table(maoIA)">Ver Cartas da IA (Console)</button>
        <button class="dev-btn" onclick="podeJogar = true; atualizarUI()">Destravar Turno</button>
    </div>
    <p style="font-size: 10px; color: #ccc;">Passe o mouse para abrir/fechar</p>
</div>

<div id="game-container">
    <div class="status-panel">
        <div style="text-align: center;">👤 VOCÊ <span id="p-pts" class="score-num">0</span> <div id="p-quedas" style="font-size:12px; color:#aaa;">Quedas: 0</div></div>
        <div style="text-align: center;">
            <div id="valor-txt" style="font-size: 18px; color: var(--gold);">VALENDO: 1</div>
            <div id="game-msg" style="font-weight: bold; color: #fff;">Aguardando...</div>
        </div>
        <div style="text-align: center;">🤖 IA (<span id="ia-mode">Normal</span>) <span id="ia-pts" class="score-num">0</span> <div id="ia-quedas" style="font-size:12px; color:#aaa;">Quedas: 0</div></div>
    </div>

    <div class="mesa">
        <div id="mesa-ia"></div>
        <div id="mesa-player"></div>
    </div>

    <div class="controls">
        <button id="btn-truco" class="btn-call" onclick="fazerChamadoPlayer()">Truco! (3)</button>
        <button class="btn-call" style="background: #34495e;" onclick="reiniciarJogoCompleto()">Reset Jogo</button>
    </div>

    <div class="hand-area">
        <div id="magic-area" class="magic-slots"></div>
        <div id="player-hand" class="hand"></div>
    </div>
</div>

<script>
    let placarPlayer = 0, placarIA = 0, quedasP = 0, quedasIA = 0;
    let valorRodada = 1, podeJogar = false;
    let buffAtivo = 0, debuffIA = 0;
    let maoPlayer = [], maoIA = [], maoPoderes = [];
    let iaInteligente = false; // Controlado pelo botão Dev
    let primeiraRodadaVencedor = null; // Para resolver empates no Truco

    const deckTruco = [
        {n:'4', v:1}, {n:'5', v:2}, {n:'6', v:3}, {n:'7', v:4},
        {n:'Q', v:5}, {n:'J', v:6}, {n:'K', v:7}, {n:'A', v:8},
        {n:'2', v:9}, {n:'3', v:10},
        {n:'7♦', v:11, m:true}, {n:'A♠', v:12, m:true}, {n:'7♥', v:13, m:true}, {n:'4♣', v:14, m:true}
    ];

    const deckMagico = [
        {n:'🔥', type:'buff', d:'+5 Força'},
        {n:'❄️', type:'debuff', d:'IA -3'},
        {n:'🛑', type:'null', d:'Anular'}
    ];

    function devAddScore(target, val) {
        if(target === 'p') placarPlayer += val; else placarIA += val;
        atualizarUI();
        validarFimJogo();
    }

    function devToggleIA() {
        iaInteligente = !iaInteligente;
        document.getElementById('ia-mode').innerText = iaInteligente ? "Inteligente" : "Normal";
        alert("Modo da IA alterado para: " + (iaInteligente ? "Inteligente (Tenta ganhar)" : "Normal (Aleatório)"));
    }

    function devGivePower() {
        if(maoPoderes.length < 4) {
            maoPoderes.push({...deckMagico[Math.floor(Math.random() * deckMagico.length)]});
            renderizar();
        }
    }

    function novaMao() {
        valorRodada = 1; quedasP = 0; quedasIA = 0; buffAtivo = 0; debuffIA = 0;
        primeiraRodadaVencedor = null;
        
        // Sorteia 3 cartas para cada de forma independente
        maoPlayer = Array.from({length: 3}, () => ({...deckTruco[Math.floor(Math.random() * deckTruco.length)]}));
        maoIA = Array.from({length: 3}, () => ({...deckTruco[Math.floor(Math.random() * deckTruco.length)]}));
        
        if(maoPoderes.length < 2) devGivePower();
        
        document.getElementById('mesa-player').innerHTML = '';
        document.getElementById('mesa-ia').innerHTML = '';
        document.getElementById('game-msg').innerText = "Sua vez!";
        
        podeJogar = true;
        renderizar();
        atualizarUI();
    }

    function renderizar() {
        const h = document.getElementById('player-hand');
        const m = document.getElementById('magic-area');
        h.innerHTML = ''; m.innerHTML = '';

        maoPoderes.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'card magic';
            div.innerHTML = `<span>${p.n}</span><br>${p.d}`;
            div.onclick = () => { 
                if(podeJogar) { 
                    if(p.type==='buff') buffAtivo = 5; 
                    if(p.type==='debuff') debuffIA = 3; 
                    maoPoderes.splice(i,1); 
                    renderizar(); 
                } 
            };
            m.appendChild(div);
        });

        maoPlayer.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = `card ${c.m ? 'manilha' : ''} ${buffAtivo > 0 ? 'glow' : ''}`;
            div.innerHTML = `<span>${c.n}</span>`;
            div.onclick = () => { if(podeJogar) checkIAAndPlay(c, i); };
            h.appendChild(div);
        });
    }

    function obterProximoValor() {
        if (valorRodada === 1) return 3;
        if (valorRodada === 3) return 6;
        if (valorRodada === 6) return 9;
        if (valorRodada === 9) return 12;
        return 12;
    }

    function fazerChamadoPlayer() {
        if(!podeJogar || valorRodada >= 12) return;
        podeJogar = false;
        let vAnt = valorRodada;
        let vProx = obterProximoValor();
        
        document.getElementById('game-msg').innerText = "Você gritou " + vProx + "!";
        
        setTimeout(() => {
            if(Math.random() > 0.4) { 
                valorRodada = vProx; 
                document.getElementById('game-msg').innerText = "IA aceitou!";
                atualizarUI(); 
                podeJogar = true; 
            } else { 
                document.getElementById('game-msg').innerText = "IA fugiu!";
                placarPlayer += vAnt; 
                setTimeout(novaMao, 1000);
            }
        }, 800);
    }

    function checkIAAndPlay(cP, iP) {
        podeJogar = false;
        if(Math.random() < 0.15 && valorRodada < 12) {
            let vAnt = valorRodada;
            let vProx = obterProximoValor();
            if(confirm("IA gritou " + vProx + "! Aceita?")) { 
                valorRodada = vProx; 
                atualizarUI(); 
                play(cP, iP); 
            } else { 
                placarIA += vAnt; 
                atualizarUI(); 
                setTimeout(novaMao, 1000); 
            }
        } else { 
            play(cP, iP); 
        }
    }

    function play(cP, iP) {
        // Escolha da IA baseada na "Inteligência" ativada nas Dev Tools
        let indexIA = 0;
        const fP = cP.v + buffAtivo;

        if (iaInteligente) {
            // IA tenta achar a menor carta que ganhe de você, senão descarta a menor que tiver
            let candidatas = maoIA.map((c, idx) => ({v: Math.max(0, c.v - debuffIA), idx: idx}));
            candidatas.sort((a,b) => a.v - b.v);
            let ganha = candidatas.find(c => c.v > fP);
            indexIA = ganha ? ganha.idx : candidatas[0].idx;
        } else {
            // Modo normal: Escolhe uma carta aleatória da mão atual dela
            indexIA = Math.floor(Math.random() * maoIA.length);
        }

        const cIA = maoIA[indexIA];
        const fIA = Math.max(0, cIA.v - debuffIA);

        document.getElementById('mesa-player').innerHTML = `<div class="card ${cP.m?'manilha':''}">${cP.n}<br><small>F:${fP}</small></div>`;
        document.getElementById('mesa-ia').innerHTML = `<div class="card ${cIA.m?'manilha':''}">${cIA.n}<br><small>F:${fIA}</small></div>`;

        setTimeout(() => {
            let rodadaAtual = 3 - maoPlayer.length; // 0 para primeira, 1 para segunda, 2 para terceira

            if(fP > fIA) {
                quedasP++;
                if (primeiraRodadaVencedor === null) primeiraRodadaVencedor = "player";
                document.getElementById('game-msg').innerText = "Você ganhou a queda!";
            } else if(fIA > fP) {
                quedasIA++;
                if (primeiraRodadaVencedor === null) primeiraRodadaVencedor = "ia";
                document.getElementById('game-msg').innerText = "IA ganhou a queda!";
            } else {
                document.getElementById('game-msg').innerText = "Empatou a queda!";
                if (primeiraRodadaVencedor === null) {
                    primeiraRodadaVencedor = "empate";
                }
            }

            maoPlayer.splice(iP, 1); 
            maoIA.splice(indexIA, 1); 
            buffAtivo = 0; debuffIA = 0;
            
            atualizarUI();

            // Regra do Truco Tradicional para fechamento de mão
            let fimMao = false;
            
            if (primeiraRodadaVencedor === "empate") {
                // Se amarrou a primeira, quem fizer a segunda ganha
                if (quedasP > quedasIA) { fimMao = true; quedasP = 2; }
                else if (quedasIA > quedasP) { fimMao = true; quedasIA = 2; }
            } else {
                if (quedasP >= 2 || quedasIA >= 2) {
                    fimMao = true;
                } else if (rodadaAtual === 1 && fP === fIA) { 
                    // Se empatou a segunda rodada, quem ganhou a primeira leva
                    fimMao = true;
                    if (primeiraRodadaVencedor === "player") quedasP = 2;
                    else quedasIA = 2;
                }
            }

            if(fimMao || maoPlayer.length === 0) {
                finalizarMao();
            } else {
                podeJogar = true;
                renderizar();
            }
        }, 1000);
    }

    function finalizarMao() {
        if(quedasP > quedasIA) placarPlayer += valorRodada;
        else if(quedasIA > quedasP) placarIA += valorRodada;
        
        atualizarUI();
        if(!validarFimJogo()) {
            setTimeout(novaMao, 1500);
        }
    }

    function validarFimJogo() {
        if(placarPlayer >= 12 || placarIA >= 12) {
            alert(placarPlayer >= 12 ? "🏆 PARABÉNS! Você venceu o jogo!" : "❌ DERROTA! A IA venceu.");
            reiniciarJogoCompleto();
            return true;
        }
        return false;
    }

    function atualizarUI() {
        document.getElementById('p-pts').innerText = placarPlayer;
        document.getElementById('ia-pts').innerText = placarIA;
        document.getElementById('p-quedas').innerText = "Quedas: " + quedasP;
        document.getElementById('ia-quedas').innerText = "Quedas: " + quedasIA;
        document.getElementById('valor-txt').innerText = "VALENDO: " + valorRodada;
        
        // Atualiza dinamicamente o texto do botão de Truco
        let vProx = obterProximoValor();
        let btnTruco = document.getElementById('btn-truco');
        if (valorRodada === 1) btnTruco.innerText = "Truco! (3)";
        else btnTruco.innerText = "Pedir " + vProx + "!";
        
        btnTruco.disabled = !podeJogar || valorRodada >= 12;
    }

    function reiniciarJogoCompleto() {
        placarPlayer = 0; 
        placarIA = 0; 
        maoPoderes = []; 
        novaMao(); 
    }

    window.onload = novaMao;
</script>
</body>
</html>
